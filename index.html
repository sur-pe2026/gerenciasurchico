<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Safety Sur Chico</title>

<style>
:root{
  --gold:#e5b611;
  --gold-soft:#f3d86a;
  --bg1:#050505;
  --bg2:#0b1220;
  --panel:rgba(255,255,255,.06);
  --panel-2:rgba(255,255,255,.08);
  --line:rgba(255,255,255,.10);
  --text-soft:rgba(255,255,255,.72);
  --shadow:0 10px 30px rgba(0,0,0,.28);
  --radius:18px;
}

*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; }

body{
  font-family: "Segoe UI", Arial, sans-serif;
  color:#fff;
  background:
    radial-gradient(900px 420px at 15% 0%, rgba(229,182,17,.18), transparent 55%),
    radial-gradient(700px 400px at 85% 0%, rgba(245,224,3,.10), transparent 50%),
    linear-gradient(180deg,#050505 0%, #0a0f18 45%, #0d1522 100%);
  overflow:hidden;
}

/* ===== APP ===== */
.app{
  height:100dvh;
  display:flex;
  flex-direction:column;
  padding:14px;
  gap:14px;
}

/* ===== TOP ===== */
.top{
  min-height:76px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:1px solid var(--line);
  border-radius:20px;
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
  backdrop-filter: blur(10px);
  box-shadow:var(--shadow);
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  min-width:0;
}

.logo{
  width:64px;
  height:64px;
  border-radius:16px;
  background:rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}

.logo img{
  width:74%;
  height:74%;
  object-fit:contain;
}

.brand-text{
  min-width:0;
}

.brand-kicker{
  font-size:11px;
  letter-spacing:1.6px;
  font-weight:800;
  color:var(--gold-soft);
  text-transform:uppercase;
  margin-bottom:4px;
}

.brand-title{
  font-size:24px;
  font-weight:900;
  line-height:1.05;
  margin:0;
}

.brand-subtitle{
  margin-top:6px;
  font-size:12px;
  color:var(--text-soft);
  font-weight:600;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:290px 1fr;
  gap:14px;
}

/* ===== SIDEBAR ===== */
.sidebar{
  min-height:0;
  padding:14px;
  border:1px solid var(--line);
  border-radius:20px;
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
  backdrop-filter: blur(10px);
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
}

.sidebar-title{
  font-size:12px;
  font-weight:900;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:var(--gold-soft);
  margin:2px 2px 8px;
}

.btn{
  position:relative;
  width:100%;
  padding:13px 14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:12px;
  text-align:left;
  transition:all .22s ease;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
}

.btn::before{
  content:"";
  position:absolute;
  left:0;
  top:10px;
  bottom:10px;
  width:4px;
  border-radius:10px;
  background:transparent;
  transition:all .22s ease;
}

.btn:hover{
  transform:translateY(-1px);
  border-color:rgba(229,182,17,.28);
  background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
}

.btn.active{
  border-color:rgba(229,182,17,.45);
  background:linear-gradient(180deg, rgba(229,182,17,.16), rgba(255,255,255,.05));
  box-shadow:
    0 0 0 1px rgba(229,182,17,.12),
    0 8px 20px rgba(0,0,0,.22);
}

.btn.active::before{
  background:linear-gradient(180deg, var(--gold), #fff1a6);
}

.btn-icon{
  width:40px;
  height:40px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}

.btn-title{
  font-size:14px;
  font-weight:800;
  letter-spacing:.2px;
}

/* ===== VIEWER ===== */
.viewer-wrap{
  min-height:0;
  border:1px solid var(--line);
  border-radius:20px;
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
  backdrop-filter: blur(10px);
  box-shadow:var(--shadow);
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.viewer-head{
  min-height:42px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 6px 0 4px;
}

.viewer-title{
  font-size:13px;
  font-weight:800;
  color:var(--text-soft);
  letter-spacing:.4px;
}

.viewer-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 12px rgba(229,182,17,.8);
}

.viewer{
  position:relative;
  flex:1;
  min-height:0;
  overflow:hidden;
  border-radius:16px;
  background:#ffffff;
  border:1px solid rgba(255,255,255,.08);
}

iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  background:#fff;
}

/* ===== FOOTER ===== */
.footer{
  min-height:48px;
  padding:0 16px;
  border:1px solid var(--line);
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  box-shadow:var(--shadow);
}

.footer img{
  height:24px;
  opacity:.92;
}

.footer-text{
  font-size:11px;
  color:rgba(255,255,255,.70);
  font-weight:600;
}

/* ===== SCROLL ===== */
.sidebar::-webkit-scrollbar{
  width:8px;
}
.sidebar::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.12);
  border-radius:10px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 980px){
  body{ overflow:auto; }

  .app{
    height:auto;
    min-height:100dvh;
  }

  .main{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
  }

  .sidebar{
    flex-direction:row;
    overflow-x:auto;
    overflow-y:hidden;
  }

  .sidebar-title{
    display:none;
  }

  .btn{
    min-width:210px;
    flex-shrink:0;
  }

  .brand-title{
    font-size:20px;
  }

  .brand-subtitle{
    font-size:11px;
  }
}
</style>

<link rel="icon" href="https://sur-pe2026.github.io/gerenciasurchico/imagenes/iconos.png" type="image/png">
</head>

<body>
<div class="app">

  <!-- TOP -->
  <div class="top">
    <div class="brand">
      <div class="logo">
        <img src="imagenes/logo.png" alt="Logo">
      </div>

      <div class="brand-text">
        <div class="brand-kicker">Safety Dashboard</div>
        <h1 class="brand-title">SAFETY SUR CHICO</h1>
        <div class="brand-subtitle">Panel de monitoreo de seguridad operacional gerencia sur chico</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-title">Visuales disponibles</div>

      <button class="btn active" data-src="https://app.powerbi.com/view?r=eyJrIjoiNzE3YWY4ZmQtODdlZS00MTNiLWEzYjYtNjc4MGM4NDExMjRjIiwidCI6IjEwYWVmMTg5LTA1ZGItNGY2Zi05NTdmLTI3MGY5N2JmNTAzYiIsImMiOjZ9" data-title="Telemetría">
        <div class="btn-icon">📡</div>
        <div class="btn-title">Telemetría</div>
      </button>

      <button class="btn" data-src="https://app.powerbi.com/view?r=eyJrIjoiODE4MTZhYjgtMmIxNy00YzFkLThlMDgtNmVkOTk1MGNmYWQ3IiwidCI6ImQ1M2YwMmQ3LTc4NzItNGExZi05Y2I1LTBkNTMxMmRhNjIwYiIsImMiOjR9" data-title="Ruta SIF">
        <div class="btn-icon">⏱️</div>
        <div class="btn-title">Ruta SIF</div>
      </button>

      <button class="btn" data-src="https://app.powerbi.com/view?r=eyJrIjoiM2FkOTY5YWYtYjJkZi00ZWY3LThkNWUtZDI4MWU2MDEwYmRjIiwidCI6ImQ1M2YwMmQ3LTc4NzItNGExZi05Y2I1LTBkNTMxMmRhNjIwYiIsImMiOjR9"data-title="Credit360">
        <div class="btn-icon">⚠️</div>
        <div class="btn-title">Credit360</div>
      </button>

      <button class="btn" data-src="https://app.powerbi.com/view?r=eyJrIjoiZWFiZDRkMDQtZWQ5NC00OTZmLThhZjYtNzI1NjI3NWY0OTIyIiwidCI6ImQ1M2YwMmQ3LTc4NzItNGExZi05Y2I1LTBkNTMxMmRhNjIwYiIsImMiOjR9" data-title="OWDs">
        <div class="btn-icon">✅</div>
        <div class="btn-title">OWDs</div>
      </button>

      <button class="btn" data-src="https://app.powerbi.com/view?r=EJEMPLO_INSPECCIONES_654" data-title="Inspecciones">
        <div class="btn-icon">🧯</div>
        <div class="btn-title">Inspecciones</div>
      </button>

      <button class="btn" data-src="https://app.powerbi.com/view?r=EJEMPLO_CAPACITACIONES_987" data-title="Capacitaciones">
        <div class="btn-icon">🎓</div>
        <div class="btn-title">Capacitaciones</div>
      </button>
    </div>

    <!-- VIEWER -->
    <div class="viewer-wrap">
      <div class="viewer-head">
        <div class="viewer-title" id="viewerTitle">Visual activa: Telemetría</div>
        <div class="viewer-dot"></div>
      </div>

      <div class="viewer">
        <iframe
          id="frame"
          src="https://app.powerbi.com/view?r=eyJrIjoiNzE3YWY4ZmQtODdlZS00MTNiLWEzYjYtNjc4MGM4NDExMjRjIiwidCI6IjEwYWVmMTg5LTA1ZGItNGY2Zi05NTdmLTI3MGY5N2JmNTAzYiIsImMiOjZ9"
          allowfullscreen="true">
        </iframe>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <img src="imagenes/CONECTA.png" alt="Conecta">
    <div class="footer-text">© 2026 Sur Chico · Panel de seguridad operacional</div>
  </div>

</div>

<script>
const btns = document.querySelectorAll('.btn');
const frame = document.getElementById('frame');
const viewerTitle = document.getElementById('viewerTitle');

btns.forEach(b => {
  b.onclick = () => {
    btns.forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    frame.src = b.dataset.src;
    viewerTitle.textContent = 'Visual activa: ' + b.dataset.title;
  };
});
</script>
</body>

</html>
